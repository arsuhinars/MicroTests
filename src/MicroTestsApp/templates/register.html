{% extends 'base.html' %}
{% load static %}

{% block title %}Регистрация{% endblock %}
{% block include %}
<link rel="stylesheet" href="{% static 'css/register.css' %}">
{% endblock %}

{% block main %}
<div class="block" id="register-form">
    <h1 style="margin-top: 0;">Регистрация</h1>
    <form method="POST" novalidate>
        {% include 'render_form.html' with form=form %}
        <input type="submit" value="Зарегестрироваться" class="button-green">
    </form>
</div>
<div style="height: 40px"></div>
<script>
    $('form').submit(function(event) {
        event.preventDefault()  //Отменяем отправку формы
        //Перенаправляем пользователя на страницу подверждения, если нет ошибок
        ajaxSubmitForm(event.target, function() {
            document.location.href = '/confirm'
        })
    })
</script>
{% endblock %}
